apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackaton-iadt-deployment
  namespace: iadt
  labels:
    app: hackaton-iadt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hackaton-iadt
  template:
    metadata:
      labels:
        app: hackaton-iadt
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: hackaton-iadt
          image: ghcr.io/curtisyoung/hackatoniadt:latest
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
              ephemeral-storage: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: iadt-secrets
                  key: gemini_api_key
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: iadt-secrets
                  key: aws_access_key_id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: iadt-secrets
                  key: aws_secret_access_key
            - name: AWS_REGION_NAME
              valueFrom:
                secretKeyRef:
                  name: iadt-secrets
                  key: aws_region_name
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: iadt-secrets
                  key: aws_region_name
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: iadt-secrets
                  key: api_key
            - name: REDIS_HOST
              value: "hackaton-iadt-redis"
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
      restartPolicy: Always


