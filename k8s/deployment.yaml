apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackaton-iadt-deployment
  namespace: iadt
  labels:
    app: hackaton-iadt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hackaton-iadt
  template:
    metadata:
      labels:
        app: hackaton-iadt
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: fix-nfs-perms
          image: ghcr.io/curtisyoung/hackatoniadt:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              find /app/data -path /app/data/.snapshot -prune -o -exec chown 1000:1000 {} + 2>/dev/null || true
              find /app/data -path /app/data/.snapshot -prune -o -type d -exec chmod 775 {} + 2>/dev/null || true
              find /app/data -path /app/data/.snapshot -prune -o -type f -exec chmod 664 {} + 2>/dev/null || true
              mkdir -p /app/data/uploads /app/data/outputs
              chown 1000:1000 /app/data/uploads /app/data/outputs
              chmod 775 /app/data/uploads /app/data/outputs
              ls -lan /app/data
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
                - DAC_OVERRIDE
          volumeMounts:
            - name: shared-data
              mountPath: /app/data
      containers:
        - name: hackaton-iadt
          image: ghcr.io/curtisyoung/hackatoniadt:latest
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
              ephemeral-storage: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: iadt-secrets
                  key: gemini_api_key
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: iadt-secrets
                  key: aws_access_key_id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: iadt-secrets
                  key: aws_secret_access_key
            - name: AWS_REGION_NAME
              valueFrom:
                secretKeyRef:
                  name: iadt-secrets
                  key: aws_region_name
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: iadt-secrets
                  key: aws_region_name
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: iadt-secrets
                  key: api_key
            - name: REDIS_HOST
              value: "hackaton-iadt-redis"
          volumeMounts:
            - name: shared-data
              mountPath: /app/data
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: hackaton-iadt-data-pvc
      restartPolicy: Always
