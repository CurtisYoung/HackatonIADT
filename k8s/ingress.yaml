apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hackaton-iadt-ingress
  namespace: iadt
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/issuer: cloudflare-origin-ca
    cert-manager.io/issuer-kind: ClusterOriginIssuer
    cert-manager.io/issuer-group: cert-manager.k8s.cloudflare.com
spec:
  rules:
    - host: iadt.matheuslucena.dev
      http:
        paths:
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: hackaton-iadt-mcp-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hackaton-iadt-service
                port:
                  number: 80
  tls:
    - hosts:
        - iadt.matheuslucena.dev
      secretName: iadt-tls-secret
