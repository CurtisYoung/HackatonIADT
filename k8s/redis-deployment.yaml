apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackaton-iadt-redis
  namespace: iadt
  labels:
    app: hackaton-iadt-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hackaton-iadt-redis
  template:
    metadata:
      labels:
        app: hackaton-iadt-redis
    spec:
      containers:
        - name: redis
          image: docker.io/library/redis:7
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          # No persistence, runs purely in memory
